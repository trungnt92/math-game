<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Math Adventure - Learn Math with Friends!</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        background-color: #2d5a27;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #game-container {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        width: 100%;
        height: 100%;
      }
      #game-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
      /* Portrait rotation overlay */
      #rotate-screen {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #1a3d18;
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #FFF8DC;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 40px;
      }
      #rotate-screen .icon { font-size: 72px; margin-bottom: 20px; }
      #rotate-screen .msg { font-size: 24px; font-weight: bold; }
      #rotate-screen .sub { font-size: 16px; margin-top: 10px; opacity: 0.7; }

      @media (orientation: portrait) {
        #rotate-screen { display: flex; }
        #game-container { display: none; }
      }
      @media (orientation: landscape) {
        #rotate-screen { display: none; }
        #game-container { display: block; }
      }
    </style>
  </head>
  <body>
    <div id="rotate-screen">
      <div class="icon">&#x1F4F1;&#x21BB;</div>
      <div class="msg">Please rotate your device</div>
      <div class="sub">This game is best played in landscape mode</div>
    </div>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
